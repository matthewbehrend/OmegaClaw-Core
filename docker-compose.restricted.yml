# Restricted deployment: agent has NO API keys and NO direct internet access.
# The agent can only reach services on the internal Docker network.
# See docs/deployment-secure-docker.md for full documentation.
#
# Usage:
#   In .env, set IRC_SERVER=irc-proxy (so the agent routes IRC through the proxy)
#   docker compose -f docker-compose.restricted.yml up -d
#
# To allowlist additional domains, add proxy services or nginx locations —
# see docs/deployment-secure-docker.md § "Network Allowlist".

services:

  omegaclaw:
    extends:
      file: docker-compose.base.yml
      service: omegaclaw-base
    networks:
      - internal
    depends_on:
      - llm-proxy
      - irc-proxy

  llm-proxy:
    extends:
      file: docker-compose.base.yml
      service: llm-proxy-base
    networks:
      - internal
      - external

  irc-proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile.socat
    environment:
      - IRC_UPSTREAM_HOST=${IRC_UPSTREAM_HOST:-irc.quakenet.org}
      - IRC_UPSTREAM_PORT=${IRC_PORT:-6667}
    networks:
      - internal
      - external
    restart: unless-stopped

networks:
  internal:
    internal: true
  external:
    driver: bridge

secrets:
  omegaclaw_auth_secret:
    environment: OMEGACLAW_AUTH_SECRET
  tg_bot_token:
    environment: TG_BOT_TOKEN
  mm_bot_token:
    environment: MM_BOT_TOKEN

volumes:
  omegaclaw-memory:
