# Default deployment: agent has full network access for web search, RAG, etc.
# All secrets remain hidden in the gateway — the agent never sees them.
# See docs/deployment-secure-docker.md for full documentation.
#
# Quick start:
#   cp .env.example .env        # fill in API keys and channel config
#   docker compose up -d
#
# Restricted mode (no direct internet — agent can only reach proxies):
#   docker compose -f docker-compose.restricted.yml up -d

services:

  omegaclaw:
    extends:
      file: docker-compose.base.yml
      service: omegaclaw-base
    networks:
      - internal
      - external
    depends_on:
      - gateway

  gateway:
    extends:
      file: docker-compose.base.yml
      service: gateway-base
    networks:
      - internal
      - external

networks:
  internal:
    internal: true
  external:
    driver: bridge

volumes:
  omegaclaw-memory:
